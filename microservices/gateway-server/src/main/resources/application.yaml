spring:
    application:
        name: gateway-server
    profiles:
        active: dev
    config:
        import: "optional:configserver:http://localhost:8888"
    cloud:
        gateway:
            server:
                webmvc:
                    routes:
                        - id: user-service
                          uri: lb://user-service
                          predicates:
                            - Path=/api/users/**
                        - id: product-service
                          uri: lb://product-service
                          predicates:
                            - Path=/api/v1/products/** 
               
server:
    port: 8889

eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/
        fetch-registry: true
        register-with-eureka: true